{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="grid" style="max-width: 600px; margin: 0 auto; margin-top: 2rem;">
    <div class="glass-card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Join CampusRide</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input class="form-control" type="text" name="name" placeholder="John Doe" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Student ID</label>
                    <input class="form-control" type="text" name="student_id" placeholder="12345678" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">College Email (Must be .edu or .ac.in)</label>
                <input class="form-control" type="email" name="email" placeholder="student@university.edu" required>
            </div>
            
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input class="form-control" type="text" name="phone" placeholder="+1234567890" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select class="form-control" name="gender" required style="background-color: var(--bg-card);">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-secondary);">Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-primary);">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
