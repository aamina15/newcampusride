{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="grid" style="max-width: 500px; margin: 0 auto; margin-top: 2rem;">
    <div class="glass-card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">College Email</label>
                <input class="form-control" type="email" name="email" placeholder="student@college.edu" autocomplete="username" required autofocus="">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="remember" id="remember" checked>
                <label for="remember" style="color: var(--text-secondary); cursor: pointer;">Remember me</label>
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-secondary);">Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-primary);">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
