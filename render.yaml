services:
  - type: web
    name: newcampusride
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0 # Matches runtime.txt if available
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
